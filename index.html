function Dropdown({ label, options, selected, onChange }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState("");
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const toggle = v => onChange(selected.includes(v) ? selected.filter(x => x !== v) : [...selected, v]);
  const active = selected.length > 0;
  const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase()));

  return (
    <div ref={ref} style={{ position: "relative", minWidth: "155px" }}>
      <button onClick={() => { setOpen(!open); setSearch(""); }} style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "9px 13px", backgroundColor: active ? "#eff6ff" : "#f8fafc",
        border: `1px solid ${active ? "#2563eb66" : "#e2e8f0"}`,
        borderRadius: "5px", cursor: "pointer",
        color: active ? "#2563eb" : "#64748b",
        fontSize: "10px", fontFamily: "'Space Mono', monospace", letterSpacing: "0.06em", gap: "8px",
        transition: "all 0.2s",
      }}>
        <span>{active ? `${label} (${selected.length})` : label}</span>
        <span style={{ transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s", fontSize: "8px" }}>▼</span>
      </button>
      {open && (
        <div style={{
          position: "absolute",
          top: "calc(100% + 6px)",
          left: "0",
          zIndex: 9999,
          backgroundColor: "#fff",
          border: "1px solid #e2e8f0",
          borderRadius: "8px",
          boxShadow: "0 20px 60px rgba(0,0,0,0.15)",
          width: "220px",
          maxHeight: "280px",
          display: "flex",
          flexDirection: "column",
          overflow: "hidden",
        }}>
          <div style={{ padding: "8px 10px", borderBottom: "1px solid #f1f5f9" }}>
            <input
              autoFocus
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search..."
              onClick={e => e.stopPropagation()}
              style={{
                width: "100%", padding: "6px 10px", fontSize: "10px",
                fontFamily: "'Space Mono', monospace", border: "1px solid #e2e8f0",
                borderRadius: "4px", outline: "none", color: "#1e293b",
                backgroundColor: "#f8fafc",
              }}
            />
          </div>
          <div style={{ overflowY: "auto", flex: 1 }}>
            {filtered.length === 0 && (
              <div style={{ padding: "14px", textAlign: "center", fontSize: "10px", fontFamily: "'Space Mono', monospace", color: "#94a3b8" }}>No results</div>
            )}
            {filtered.map(opt => {
              const sel = selected.includes(opt);
              return (
                <div key={opt} onClick={() => toggle(opt)} style={{
                  padding: "9px 13px", cursor: "pointer", display: "flex", alignItems: "center", gap: "10px",
                  backgroundColor: sel ? "#eff6ff" : "transparent",
                  borderBottom: "1px solid #f8fafc", transition: "background 0.1s",
                }}
                  onMouseEnter={e => e.currentTarget.style.backgroundColor = sel ? "#eff6ff" : "#f8fafc"}
                  onMouseLeave={e => e.currentTarget.style.backgroundColor = sel ? "#eff6ff" : "transparent"}
                >
                  <span style={{
                    width: "13px", height: "13px", border: `1px solid ${sel ? "#2563eb" : "#cbd5e1"}`,
                    borderRadius: "2px", display: "flex", alignItems: "center", justifyContent: "center",
                    backgroundColor: sel ? "#2563eb" : "transparent", flexShrink: 0,
                  }}>
                    {sel && <span style={{ color: "#fff", fontSize: "8px", fontWeight: "bold", lineHeight: 1 }}>✓</span>}
                  </span>
                  <span style={{ fontSize: "10px", fontFamily: "'Space Mono', monospace", color: sel ? "#2563eb" : "#475569" }}>{opt}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

                  <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "7px", color: "#cbd5e1", textTransform: "uppercase", letterSpacing: "0.14em" }}>AI INTEGRATION MAP — LIVE</span>
                </div>
              </div>

              {/* Skills */}
              <div>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#2563eb", letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: "18px" }}>// FULL SKILL STACK</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "10px" }}>
                  {SKILLS.map(sk => (
                    <div key={sk.group} style={{ padding: "18px 20px", backgroundColor: "#ffffff", border: "1px solid #e2e8f0", borderRadius: "6px" }}>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: "12px" }}>{sk.group}</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                        {sk.items.map(item => (
                          <span key={item} style={{
                            padding: "4px 10px", fontSize: "10px", fontFamily: "'Space Mono', monospace",
                            border: item === "Python" ? "1px solid #3b82f633" : "1px solid #e2e8f0",
                            color: item === "Python" ? "#2563eb" : "#475569",
                            backgroundColor: item === "Python" ? "#eff6ff" : "transparent",
                            borderRadius: "3px",
                          }}>{item}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══ PROJECTS ════════════════════════════════════════ */}
          {section === "Projects" && !openProject && (
            <div>
              <div style={{ animation: "fadeUp 0.4s ease both", marginBottom: "40px" }}>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#2563eb", letterSpacing: "0.18em", marginBottom: "16px" }}>// PROJECTS</div>
                <h2 style={{ fontFamily: "'Bebas Neue', cursive", fontSize: "clamp(44px, 8vw, 76px)", letterSpacing: "0.03em", lineHeight: 0.92, marginBottom: "10px", color: "#0f172a" }}>
                  REAL SYSTEMS.<br /><span style={{ color: "#2563eb" }}>REAL RESULTS.</span>
                </h2>
                <p style={{ color: "#94a3b8", fontFamily: "'Space Mono', monospace", fontSize: "10px", letterSpacing: "0.06em" }}>
                  Click any project to read the full case study. Filter by platform, integration, category, or industry.
                </p>
              </div>

              {/* Filter bar */}
              <div style={{ animation: "fadeUp 0.4s ease 0.08s both", backgroundColor: "#ffffff", border: "1px solid #e2e8f0", borderRadius: "8px", padding: "20px", marginBottom: "28px", position: "relative", zIndex: 50 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "14px" }}>
                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.14em" }}>Filter Projects</div>
                  {hasFilter > 0 && (
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: "#2563eb" }}>
                      {filtered.length} project{filtered.length !== 1 ? "s" : ""} match
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", alignItems: "center" }}>
                  <Dropdown label="CATEGORY" options={CATEGORIES} selected={catF} onChange={setCatF} />
                  <Dropdown label="INDUSTRY" options={INDUSTRIES} selected={indF} onChange={setIndF} />
                  <Dropdown label="BUILT ON" options={BUILT_ONS} selected={builtF} onChange={setBuiltF} />
                  <Dropdown label="INTEGRATED WITH" options={INTEGRATIONS} selected={intF} onChange={setIntF} />
                  {hasFilter > 0 && (
                    <button onClick={clearAll} style={{
                      background: "none", border: "1px solid #fca5a5", borderRadius: "5px", cursor: "pointer",
                      padding: "9px 13px", fontFamily: "'Space Mono', monospace", fontSize: "9px",
                      color: "#ef4444", letterSpacing: "0.06em", transition: "all 0.2s",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.backgroundColor = "#fef2f2"; e.currentTarget.style.borderColor = "#ef4444"; }}
                      onMouseLeave={e => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.style.borderColor = "#fca5a5"; }}
                    >CLEAR ALL ×</button>
                  )}
                </div>
              </div>

              {filtered.length === 0 ? (
                <div style={{ textAlign: "center", padding: "80px", fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "#cbd5e1" }}>
                  NO MATCHES — ADJUST YOUR FILTERS
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(285px, 1fr))", gap: "14px" }}>
                  {filtered.map((p, i) => <ProjectCard key={p.id} project={p} index={i} onOpen={setOpenProject} />)}
                </div>
              )}
            </div>
          )}

          {/* ══ PROJECT BLOG ════════════════════════════════════ */}
          {section === "Projects" && openProject && (
            <ProjectBlog project={openProject} onBack={() => setOpenProject(null)} />
          )}

          {/* ══ CONTACT ═════════════════════════════════════════ */}
          {section === "Contact" && (
            <div style={{ animation: "fadeUp 0.5s ease both", maxWidth: "560px" }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#2563eb", letterSpacing: "0.18em", marginBottom: "18px" }}>// CONTACT</div>
              <h2 style={{ fontFamily: "'Bebas Neue', cursive", fontSize: "clamp(50px, 9vw, 84px)", letterSpacing: "0.03em", lineHeight: 0.92, marginBottom: "22px", color: "#0f172a" }}>
                LET'S BUILD<br /><span style={{ color: "#2563eb" }}>SOMETHING REAL.</span>
              </h2>
              <p style={{ color: "#64748b", fontSize: "13px", lineHeight: 1.85, marginBottom: "40px", fontFamily: "'Space Mono', monospace" }}>
                Tell me your bottleneck. I'll tell you exactly how to automate it — and how fast.
              </p>

              <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "20px" }}>
                {[
                  { label: "EMAIL", value: "waqasai.consulting@gmail.com", href: "mailto:waqasai.consulting@gmail.com" },
                  { label: "WHATSAPP", value: "+92 309 782 9808", href: "https://wa.me/923097829808" },
                  { label: "LINKEDIN", value: "linkedin.com/in/muhammad-waqas-liaqat", href: "https://www.linkedin.com/in/muhammad-waqas-liaqat/" },
                  { label: "BOOK A CALL", value: "Free strategy session — Book on Calendly →", href: "https://calendly.com/waqasliaqat630/muhammad-waqas" },
                ].map(item => (
                  <a key={item.label} href={item.href} target="_blank" rel="noopener noreferrer"
                    style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px", backgroundColor: "#ffffff", border: "1px solid #e2e8f0", borderRadius: "6px", cursor: "pointer", transition: "border-color 0.2s", textDecoration: "none" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = "#2563eb44"}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "#e2e8f0"}
                  >
                    <div>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "7px", color: "#94a3b8", letterSpacing: "0.14em", marginBottom: "4px" }}>{item.label}</div>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "#475569" }}>{item.value}</div>
                    </div>
                    <span style={{ color: "#2563eb", fontFamily: "'Space Mono', monospace", fontSize: "12px" }}>→</span>
                  </a>
                ))}
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "14px 18px", backgroundColor: "#ffffff", border: "1px solid #e2e8f0", borderRadius: "6px" }}>
                <span style={{ width: "7px", height: "7px", borderRadius: "50%", backgroundColor: "#2563eb", animation: "glowPulse 2s ease-in-out infinite", flexShrink: 0 }} />
                <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: "#64748b", letterSpacing: "0.08em" }}>CURRENTLY AVAILABLE FOR NEW PROJECTS</span>
              </div>
            </div>
          )}
        </main>

        <footer style={{ borderTop: "1px solid #e2e8f0", padding: "18px 40px", display: "flex", justifyContent: "space-between", position: "relative", zIndex: 1 }}>
          <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#cbd5e1", letterSpacing: "0.1em" }}>WAQAS © 2025</span>
          <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", color: "#cbd5e1", letterSpacing: "0.1em" }}>AI AUTOMATION ENGINEER</span>
        </footer>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(Portfolio));
  </script>
</body>
