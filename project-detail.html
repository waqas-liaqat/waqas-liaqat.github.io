<style>
/* Header Robotic Head Styles */
.nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
}

.ai-indicator {
    position: relative;
}

.robot-head {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 8px;
    position: relative;
    animation: gentle-pulse 4s ease-in-out infinite;
}

.robot-eye {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    top: 10px;
    animation: header-blink 6s infinite;
}

.left-eye { left: 8px; }
.right-eye { right: 8px; }

.robot-mouth {
    position: absolute;
    width: 12px;
    height: 2px;
    background: white;
    border-radius: 1px;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    animation: header-talk 4s infinite;
}

@keyframes gentle-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.9; }
}

@keyframes header-blink {
    0%, 45%, 55%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.1); }
}

@keyframes header-talk {
    0%, 40%, 60%, 100% { width: 12px; }
    50% { width: 16px; }
}

/* Update existing header styles if needed */
nav h1 a {
    color: #333;
    text-decoration: none;
    font-size: 1.5rem;
    font-weight: bold;
}
</style>
